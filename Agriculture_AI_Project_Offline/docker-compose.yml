version: '4.51.0'

services:
  backend:
    build: .
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=production
      - DISABLE_AUTH=true
    volumes:
      - ./backend/models:/app/backend/models
      - ./backend/data:/app/backend/data
      - ./logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - agriculture-network

networks:
  agriculture-network:
    driver: bridge
